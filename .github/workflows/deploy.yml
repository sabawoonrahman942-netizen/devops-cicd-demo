name: CI-CD Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/devops-cicd-demo
            git pull
            docker build -t devops-cicd-demo .
            docker stop web-demo || true
            docker rm web-demo || true
            docker run -d -p 8084:80 --name web-demo devops-cicd-demo
